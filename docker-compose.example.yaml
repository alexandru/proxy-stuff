services:
  api-proxy:
    image: ghcr.io/alexandru/proxy-stuff:latest
    container_name: api-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS mode.
      # - "443:443"
    environment:
      ENABLE_HTTPS: "false"
      HTTP_PORT: "80"
      ROUTE_MAP: >
        {
          "/claude/v1": "https://api.anthropic.com/v1",
          "/codex/v1": "https://api.openai.com/v1"
        }
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
