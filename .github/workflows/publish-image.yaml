name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: latest

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/alexandru/proxy-stuff

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: python3 -m unittest discover -s tests

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ${{ matrix.platform }} image
        run: |
          docker build \
            --platform "${PLATFORM}" \
            --tag "${IMAGE}:${TAG}-${ARCH}" \
            .
          docker push "${IMAGE}:${TAG}-${ARCH}"
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          TAG: ${{ inputs.tag }}

  publish-manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          docker manifest create "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"
          docker manifest push "${IMAGE}:${TAG}"
        env:
          TAG: ${{ inputs.tag }}
